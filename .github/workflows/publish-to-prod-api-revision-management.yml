#Reusable workflow to create a backup copy of current revision and delete older revisions
name: Create-Backup-Revision-and-Delete-Older-Revisions-Of-Prod-API
run-name: Create-Backup-Revision-and-Delete-Older-Revisions-Of-Prod-API
#Author martin francis kallukalam
# Note that this workflow only takes 1 API as input
on:
  workflow_call:
    inputs:
      API_MANAGEMENT_ENVIRONMENT:
        required: true
        type: string
      REVISION_ID:
        required: true
        type: string
      API_NAME_FOR_REVISIONING:
        required: true
        type: string
        default: ''
concurrency:
 group: create-backup-revision-and-delete-older-revisions-of-prod-api
 cancel-in-progress: false

env:
  DEBUG_STEPS: ${{ vars.DEBUG_STEPS }}
  AZURE_CLIENT_ID: "92f5cefc-a75b-4687-89c3-e9f7aaeff7c6"
  API_MANAGEMENT_SERVICE_NAME: "feiaz-apim-prod"
  AZURE_RESOURCE_GROUP_NAME: "apim"
  AZURE_SUBSCRIPTION_ID: "db73da55-ad6a-4d59-aeea-bba62c278f2a"
  AZURE_TENANT_ID: "21c9315b-cdc8-41c8-b30d-d4da2c5a804b"
  #DEBUG_STEPS should be repository variables
jobs:
    Check-Actor-Permission-To-Run-Workflow:
     uses: martin2176/ecs-apim-workflows/.github/workflows/check-actor-permission.yml@main
    
    Deployment-Protection-Rule:
     name: Deployment-Protection-Rule
     environment: ${{ inputs.API_MANAGEMENT_ENVIRONMENT }}
     runs-on: ubuntu-latest
     steps:
      - name: Waiting-For-Approval
        id: waiting-for-approval
        run: echo "Waiting for Deployment Approval."
     
    Create-Backup-Revision-and-Delete-Older-Revisions:
     if: ${{ inputs.API_NAME_FOR_REVISIONING != '' }} 
     name: Create-Backup-Revision-and-Delete-Older-Revisions-Of-API-${{ inputs.API_NAME_FOR_REVISIONING }}
     runs-on: ubuntu-latest
     steps:
      - name: Login-to-Azure-with-Federated-Identity
        id: login-to-azure-with-federated-identity
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Get-Bearer-Token-for-APIOPS-Publisher
        id: get-bearer-token-for-apiops-publisher
        run: |
          AZURE_BEARER_TOKEN_JSON=$(az account get-access-token --resource https://management.azure.com/ | jq -r '.')
          AZURE_BEARER_TOKEN=$(echo "$AZURE_BEARER_TOKEN_JSON" | jq -r '.accessToken')
          echo "AZURE_BEARER_TOKEN="$AZURE_BEARER_TOKEN"" >> $GITHUB_ENV
          echo "$AZURE_BEARER_TOKEN"
      - name: Check-If-API-Exist
        id: check-if-api-exist
        uses: azure/cli@v2
        with:
         azcliversion: latest
         inlineScript: |
          API_COUNT=$(az apim api list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --query "[?name=='${{ inputs.API_NAME_FOR_REVISIONING }}']" | jq '. | length')
          echo "API_COUNT=$API_COUNT" >> $GITHUB_OUTPUT
          echo "API_COUNT=$API_COUNT"
      - name: Create-Backup-Revision-And-Delete-Older-Revisions
        id: create-backup-revision-and-delete-older-revisions
        if: steps.check-if-api-exist.outputs.API_COUNT == '1'
        #Run this step only if API exists
        uses: azure/cli@v2
        with:
         azcliversion: latest
         inlineScript: |
          tdnf install tzdata -yq #donot remove this line.required for est timezone reporting
          REVISION_DATE=$(TZ="US/Eastern" date  +"EST-day-%Y-%m-%d-time-%H-%M-%S")
          echo "Creating a new Revision of API ${{ inputs.API_NAME_FOR_REVISIONING }}"
          az apim api revision create -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --api-revision "pre-${{ inputs.REVISION_ID }}-$REVISION_DATE" --api-revision-description "ID:pre-${{ inputs.REVISION_ID }}-$REVISION_DATE is created prior to deploying ${{ inputs.REVISION_ID }}"
          echo "Making the revision offline"
          az rest --method patch \
           --url "https://management.azure.com/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP_NAME }}/providers/Microsoft.ApiManagement/service/${{ env.API_MANAGEMENT_SERVICE_NAME }}/apis/${{ inputs.API_NAME_FOR_REVISIONING }};rev=pre-${{ inputs.REVISION_ID }}-$REVISION_DATE?api-version=2024-05-01" \
           --header "Content-Type=application/json" "If-Match=*" \
           --body '{"properties":{"isOnline":false}}'
          echo "Current list of API Revisions"
          az apim api revision list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --query "[].{APIid:apiId,IsCurrent:isCurrent,APIRevision:apiRevision}" -o table
          echo "Current list of API Releases"
          az apim api release list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }}  --query "[].{Name:name,CreatedTime:createdDateTime}" -o table
          echo "Calculating API Revisions & Releases to Delete"
          REVISIONS_TO_DELETE_TAB_OUTPUT=$(az apim api revision list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --query  "sort_by([?isCurrent == \`false\` && apiRevision != '1'],&createdDateTime)[:-1].apiRevision" -o tsv)
          NUMBER_OF_REVISIONS_TO_DELETE=$(az apim api revision list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --query  "sort_by([?isCurrent == \`false\` && apiRevision != '1'],&createdDateTime)[:-1].apiRevision" | jq '. | length')
          RELEASES_TO_DELETE_TAB_OUTPUT=$(az apim api release list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --query  "sort_by([], &createdDateTime)[:-2].name" -o tsv)
          NUMBER_OF_RELEASES_TO_DELETE=$(az apim api release list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --query  "sort_by([], &createdDateTime)[:-2].name" | jq '. | length')
          
          if [ "$NUMBER_OF_REVISIONS_TO_DELETE" -eq 0 ]
          then
           echo "There are no Old Revisions to Delete."
          else
          echo -e "Old Revision(s) to Delete are:\n$REVISIONS_TO_DELETE_TAB_OUTPUT"
          echo "Deleting Old Revision(s)."
           for REVISION in $REVISIONS_TO_DELETE_TAB_OUTPUT
           do
            echo "Deleting Revision: $REVISION of API ${{ inputs.API_NAME_FOR_REVISIONING }}"
            az apim api delete --yes -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id "${{ inputs.API_NAME_FOR_REVISIONING }};rev=$REVISION"
            sleep 5
           done
          fi
          if [ "$NUMBER_OF_RELEASES_TO_DELETE" -eq 0 ]
          then
           echo "There are no Old Releases to Delete."
          else
          echo -e "Old Release(s) to Delete are:\n$RELEASES_TO_DELETE_TAB_OUTPUT"
          echo "Deleting Old Release(s)."
           for RELEASE in $RELEASES_TO_DELETE_TAB_OUTPUT
           do
            echo "Deleting Release: $RELEASE of API ${{ inputs.API_NAME_FOR_REVISIONING }}"
            az apim api release delete -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --release-id $RELEASE 
            sleep 5
           done
          fi          
          
