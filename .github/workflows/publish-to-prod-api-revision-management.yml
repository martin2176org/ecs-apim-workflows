#Reusable workflow to create a backup copy of current revision and delete older revisions
name: Create-Backup-Revision-and-Delete-Older-Revisions-Of-Prod-API
run-name: Create-Backup-Revision-and-Delete-Older-Revisions-Of-Prod-API
#Author martin francis kallukalam
# Note that this workflow only takes 1 API as input
on:
  workflow_call:
    inputs:
      API_MANAGEMENT_ENVIRONMENT:
        required: true
        type: string
      MILESTONE_TITLE:
        required: true
        type: string
      API_NAME_FOR_REVISIONING:
        required: true
        type: string
concurrency:
 group: create-backup-revision-and-delete-older-revisions-of-prod-api
 cancel-in-progress: false

env:
  DEBUG_STEPS: ${{ vars.DEBUG_STEPS }}
  AZURE_CLIENT_ID: "cbbb6866-4d3f-414f-a8ea-317e912b8319"
  API_MANAGEMENT_SERVICE_NAME: "feiaz-apim-prod"
  AZURE_RESOURCE_GROUP_NAME: "apim"
  AZURE_SUBSCRIPTION_ID: "db73da55-ad6a-4d59-aeea-bba62c278f2a"
  AZURE_TENANT_ID: "21c9315b-cdc8-41c8-b30d-d4da2c5a804b"
  #DEBUG_STEPS should be repository variables
jobs:
    Create-Backup-Revision-and-Delete-Older-Revisions:
     if: ${{ inputs.API_NAME_FOR_REVISIONING != '' }} 
     name: Create-Backup-Revision-and-Delete-Older-Revisions-Of-API-${{ inputs.API_NAME_FOR_REVISIONING }}
     runs-on: ubuntu-latest
     steps:
      - name: Login-to-Azure-with-Federated-Identity
        id: login-to-azure-with-federated-identity
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Get-Bearer-Token-for-APIOPS-Publisher
        id: get-bearer-token-for-apiops-publisher
        run: |
          AZURE_BEARER_TOKEN_JSON=$(az account get-access-token --resource https://management.azure.com/ | jq -r '.')
          AZURE_BEARER_TOKEN=$(echo "$AZURE_BEARER_TOKEN_JSON" | jq -r '.accessToken')
          echo "AZURE_BEARER_TOKEN="$AZURE_BEARER_TOKEN"" >> $GITHUB_ENV
          echo "$AZURE_BEARER_TOKEN"
      - name: Check-If-API-Exist
        id: check-if-api-exist
        uses: azure/cli@v2
        with:
         inlineScript: |
          API_COUNT=$(az apim api list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --query "[?name=='${{ inputs.API_NAME_FOR_REVISIONING }}']" | jq '. | length')
          echo "API_COUNT=$API_COUNT" >> $GITHUB_OUTPUT
          echo "API_COUNT=$API_COUNT"
      - name: Create-Backup-Revision-And-Delete-Older-Revisions
        id: create-backup-revision-and-delete-older-revisions
        if: steps.check-if-api-exist.outputs.API_COUNT == '1'
        #Run this step only if API exists
        uses: azure/cli@v2
        with:
         inlineScript: |
          echo "Current list of API Revisions"
          az apim api revision list -o table -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }}
          echo "Current list of API Releases"
          az apim api release list -o table -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }}
          echo "Calculating API Revisions to Delete"
          REVISIONS_TO_DELETE_TAB_OUTPUT=$(az apim api revision list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --query  "sort_by([?isCurrent == \`false\` && apiRevision != '1'],&createdDateTime)[:-1].apiRevision" -o tsv)
          NUMBER_OF_REVISIONS_TO_DELETE=$(az apim api revision list -g ${{ env.AZURE_RESOURCE_GROUP_NAME }} -n ${{ env.API_MANAGEMENT_SERVICE_NAME }} --api-id ${{ inputs.API_NAME_FOR_REVISIONING }} --query  "sort_by([?isCurrent == \`false\` && apiRevision != '1'],&createdDateTime)[:-1].apiRevision" | jq '. | length')
          if [ "$NUMBER_OF_REVISIONS_TO_DELETE" -eq 0 ]
          then
           echo "There are no Revisions to Delete."
          else
          echo "Revisions to Delete are: $REVISIONS_TO_DELETE_TAB_OUTPUT"
          fi
          
