name: reusableworkflow
run-name: reusableworkflow
on:
  workflow_call:
permissions:
  id-token: write
  contents: read
jobs:
 reusableworkflow:
  runs-on: ubuntu-latest
  env:
    INPUT: "${{ toJSON(inputs) }}"
    EVENT_INPUT: "${{ toJSON(github.event.inputs) }}"
  steps:
  - name: Debug
    run: |
     echo "actor=${{github.actor}}"
     echo "event.inputs: $EVENT_INPUT"
     echo "inputs: $INPUT"
