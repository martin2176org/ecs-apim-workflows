name: Check-Actor-Permission-To-Run-Workflow
run-name: Check-Actor-Permission-To-Run-Workflow
on:
  workflow_call:
jobs:
 Check-Actor-Permission-To-Run-Workflow:
  name: Check-Actor-Permission-To-Run-Workflow
  runs-on: ubuntu-latest
  env:
    ALLOWED_ACTORS: '["martin2176", "Martin-Kallu-AAH2267_ferg", "Sarah-Newpo-AAN4607_ferg", "Adam-Metel-ABJ6909_ferg", "Ranju-Nair-ABJ7982_ferg" ]'
  steps:
  - name: Exit-If-Actor-Not-Allowed
    continue-on-error: false
    if: ${{ !contains(fromJSON(env.ALLOWED_ACTORS), github.actor) }}
    #if: contains(fromJSON(env.ALLOWED_ACTORS), github.actor)
    run: |
     echo "#### ${{ github.actor }} not allowed to Deploy Artifacts to Production APIM ❌" >> $GITHUB_STEP_SUMMARY
     echo "::error title=Permission Denied::${{ github.actor }} is not allowed to Deploy Artifacts to Production APIM."
     exit 1

