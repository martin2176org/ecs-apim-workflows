#Reusable workflow to Get token against Federated Identity
name: GetToken-to-Prod-Federated-Identity
run-name: GetToken-to-Prod-Federated-Identity
#Author martin francis kallukalam
on:
  workflow_call:
    inputs:
      API_MANAGEMENT_ENVIRONMENT:
        required: true
        type: string
    outputs:
      AZURE_BEARER_TOKEN:
        description: "Bearer token to Authenticate with Azure"
        value: ${{ jobs.GetToken-to-Federated-Identity.outputs.AZURE_BEARER_TOKEN }}
permissions:
  contents: read
  id-token: write
env:
  DEBUG_STEPS: ${{ vars.DEBUG_STEPS }}
  AZURE_CLIENT_ID: "92f5cefc-a75b-4687-89c3-e9f7aaeff7c6"
  API_MANAGEMENT_SERVICE_NAME: "feiaz-apim-prod"
  AZURE_RESOURCE_GROUP_NAME: "apim"
  AZURE_SUBSCRIPTION_ID: "db73da55-ad6a-4d59-aeea-bba62c278f2a"
  AZURE_TENANT_ID: "21c9315b-cdc8-41c8-b30d-d4da2c5a804b"
  # DEBUG_STEPS should be repository variables
jobs:
    Check-Actor-Permission-To-Run-Workflow:
     uses: martin2176/ecs-apim-workflows/.github/workflows/check-actor-permission.yml@main
     
    GetToken-to-Federated-Identity:
     name: GetToken-to-Prod-Federated-Identity
     outputs:
      AZURE_BEARER_TOKEN: ${{ steps.get-bearer-token.outputs.AZURE_BEARER_TOKEN }}
     environment: ${{ inputs.API_MANAGEMENT_ENVIRONMENT }}
     runs-on: ubuntu-latest
     steps:
      - name: Login-to-Azure-with-Federated-Identity
        id: login-to-azure-with-federated-identity
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Get-Bearer-Token
        id: get-bearer-token
        run: |
          AZURE_BEARER_TOKEN_JSON=$(az account get-access-token --resource https://management.azure.com/ | jq -r '.')
          AZURE_BEARER_TOKEN=$(echo "$AZURE_BEARER_TOKEN_JSON" | jq -r '.accessToken')
          echo "AZURE_BEARER_TOKEN="$AZURE_BEARER_TOKEN""  >> $GITHUB_OUTPUT                    
                   
