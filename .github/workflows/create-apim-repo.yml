name: Manual-Trigger-To-Create-APIM-Repo
run-name: Manual-Trigger-To-Create-APIM-Repo
#martin francis kallukalam
on:
  workflow_dispatch:
    inputs:
      REPO_NAME:
        description: |
         Enter name of APIM repo in the format all lowercase apim-<apiname>
         Example: apim-product-pricing-aks
        required: true
        type: string
        
permissions:
  contents: write
env:
  REPO_ORG: "martin2176"
  TEMPLATE_REPO: "apim-secrets"
  APIM_APPROVERS_TEAM_ID: 17366620
  RULESET_NAME: "Require-Pull-Request"
  DEPLOYMENT_ENV: "prod"
  REPO_NAME_INPUT: ${{ inputs.REPO_NAME }}
  
jobs:
  Create-and-Configure-AIM-Repo:
    name: Create-and-Configure-AIM-Repo
    runs-on: ubuntu-latest
    env:
     GH_TOKEN: ${{ secrets.MARTIN_PAT_TOKEN }}
    steps:
      - name: Check-for-Repo-Naming-Standard 
        id: check-for-repo-naming-standard
        shell: bash  
        run: |
          if [[ "${REPO_NAME_INPUT}" != apim-* ]]; 
           then
            echo "Error: The repo_name must start with the lowercase prefix apim-"
            echo "#### Repo Name does not start with lowercase apim-.Exiting ❌" >> $GITHUB_STEP_SUMMARY
            echo "::error title=Repo Name does not start with lowercase apim-.Exiting"
            exit 1
           else
           echo "REPO_NAME_LOWERCASE=${REPO_ORG,,}/${REPO_NAME_INPUT,,}" >> $GITHUB_ENV #convert the full repo name to all lowercase
          fi
          echo "REPO_NAME_LOWERCASE=${REPO_ORG,,}/${REPO_NAME_INPUT,,}"
          
      - name: Create-Private-Repo-From-Template-Repo 
        id: create-private-repo-from-template-repo
        shell: bash  
        run: |
          echo Repository to be created is: "$REPO_NAME_LOWERCASE"
          gh repo view "$REPO_NAME_LOWERCASE" > /dev/null 2>&1 || gh repo create "$REPO_NAME_LOWERCASE" --template "$REPO_ORG"/"$TEMPLATE_REPO" --public
          #To make the workflow idempotent. If repo exists just continue on
      - name: Delete-Ruleset-If-Exists #To make the workflow idempotent. deleting and recreating it
        id: delete-ruleset-if-exists
        shell: bash
        run: |
         RULESET_ID=$(gh api repos/$REPO_NAME_LOWERCASE/rulesets \
         --jq ".[] | select(.name == \"${{ env.RULESET_NAME }}\") | .id")
         if [ -n "$RULESET_ID" ]; then
         gh api --method DELETE repos/$REPO_NAME_LOWERCASE/rulesets/$RULESET_ID
         else
          echo "Ruleset not found.Nothing to delete.Continuing" 
         fi
      - name: Create-Branch-Protection-Ruleset
        id: create-branch-protection-rule-set
        shell: bash  
        run: |
          echo '{
           "name": "${{ env.RULESET_NAME }}",
           "target": "branch",
           "enforcement": "active",
           "conditions": {
            "ref_name": {
            "exclude": [],
            "include": [
            "refs/heads/main"
            ]
            }
            },
           "bypass_actors": [],
           "rules": [
           {
           "type": "deletion"
           },
           {
           "type": "non_fast_forward"
           },
           {
           "type": "pull_request",
           "parameters": {
           "required_approving_review_count": 1,
           "dismiss_stale_reviews_on_push": true,
           "required_reviewers": [ ],
           "require_code_owner_review": true,
           "require_last_push_approval": true,
           "required_review_thread_resolution": false,
           "allowed_merge_methods": [
           "merge",
           "squash"
           ]
           }
           }
           ]
           }' > data.json
          gh api --method POST -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" /repos/$REPO_NAME_LOWERCASE/rulesets --input data.json
      - name: Delete-Environment-If-Exists #To make the workflow idempotent. deleting and recreating it
        id: delete-environment-if-exists
        shell: bash
        run: |
         gh api --method DELETE -H "Accept: application/vnd.github+json" \
         -H "X-GitHub-Api-Version: 2022-11-28" /repos/$REPO_NAME_LOWERCASE/environments/$DEPLOYMENT_ENV > /dev/null 2>&1 || true
      - name: Create-Environment-and-Deployment-Protection-Rule
        if: false
        id: create-environment-and-deployment-protection-rule
        shell: bash  
        run: |
          echo '{
          "prevent_self_review": true,
          "reviewers": [
          {
          "type": "Team",
          "id": "${{ env.APIM_APPROVERS_TEAM_ID }}"
           }],
          "can_admins_bypass": false
          }' > data.json
          gh api --method PUT -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" /repos/$REPO_NAME_LOWERCASE/environments/$DEPLOYMENT_ENV --input data.json      
